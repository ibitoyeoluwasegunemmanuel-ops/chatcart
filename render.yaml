services:
  - type: web
    name: chatcart-api
    env: docker
    branch: master
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://chatcart-web.onrender.com

  - type: static
    name: chatcart-web
    branch: master
    buildCommand: |
      mkdir -p dist
      cp -R frontend/* dist/
      cat > dist/config.js <<EOF
      window.CHATCART_API_BASE = "${CHATCART_API_BASE}";
      EOF
    publishPath: dist
    envVars:
      - key: CHATCART_API_BASE
        value: https://chatcart-api.onrender.com/api
