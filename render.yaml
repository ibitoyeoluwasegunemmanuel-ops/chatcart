services:
  - type: web
    name: chatcart-api
    env: docker
    branch: master
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true

  - type: static
    name: chatcart-web
    branch: master
    buildCommand: |
      mkdir -p dist
      cp -R frontend/* dist/
      cat > dist/config.js <<EOF
      window.CHATCART_API_BASE = "${VITE_API_URL}";
      EOF
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://chatcart-api.onrender.com/api
