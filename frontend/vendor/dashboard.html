<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vendor Dashboard</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h2>ChatCart</h2>
      <ul>
        <li>Dashboard</li>
        <li>Products</li>
        <li>Orders</li>
        <li>Automation</li>
        <li>Social Media</li>
        <li>Analytics</li>
        <li>Settings</li>
      </ul>
    </aside>

    <main class="content">
      <header class="topbar">
        <h1>Vendor Dashboard</h1>
        <div class="topbar-actions">
          <button class="notify-toggle" aria-label="Notifications">
            Notifications
            <span class="notify-count">0</span>
          </button>
          <button class="btn-primary">Upload Product</button>
        </div>
      </header>

      <div class="cards">
        <div class="card">
          <h3>Total Sales</h3>
          <p>$2,430</p>
        </div>

        <div class="card">
          <h3>Orders</h3>
          <p>120</p>
        </div>

        <div class="card">
          <h3>Products</h3>
          <p>32</p>
        </div>
      </div>

      <section class="products">
        <h2>Your Products</h2>

        <table>
          <tr>
            <th>Name</th>
            <th>Price</th>
            <th>Status</th>
          </tr>

          <tr>
            <td>Sneakers</td>
            <td>$40</td>
            <td>Active</td>
          </tr>
        </table>
      </section>

      <section class="chart-panel">
        <h2>Sales Trend</h2>
        <canvas class="chart-canvas" data-points="20,35,32,48,60,55,68,80"></canvas>
      </section>
    </main>
  </div>
  <div class="notification-panel">
    <h3>Real-time Notifications</h3>
    <ul class="notification-list"></ul>
  </div>
  <script src="../js/app.js"></script>
</body>
</html>
